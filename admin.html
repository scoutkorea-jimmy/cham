<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 · 한국참전통발효식품협동조합</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://esm.sh" crossorigin>
<link rel="stylesheet" href="assets/site.css">
<style id="admin-style">
  body { background: var(--surface-2); }
  .admin { display: flex; min-height: 100vh; }
  .admin-side { width: 250px; flex-shrink: 0; background: var(--main-deeper); color: #fff; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .admin-side .as-brand { display: flex; align-items: center; gap: 11px; padding: 22px 22px 18px; border-bottom: 1px solid rgba(255,255,255,.12); }
  .admin-side .as-brand img { width: 38px; height: 38px; background: var(--bg); border-radius: 9px; padding: 4px; }
  .admin-side .as-brand b { font-family: var(--font-head); font-weight: 800; font-size: 15px; line-height: 1.2; }
  .admin-side .as-brand span { font-size: 10.5px; color: var(--sub); letter-spacing: .08em; }
  .admin-nav { padding: 14px 12px; display: flex; flex-direction: column; gap: 3px; flex: 1; overflow-y: auto; }
  .admin-nav button { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; padding: 11px 14px; border: none; background: transparent; color: rgba(255,255,255,.75); font: inherit; font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all var(--dur-fast) var(--ease); }
  .admin-nav button:hover { background: rgba(255,255,255,.08); color: #fff; }
  .admin-nav button.on { background: var(--point); color: #fff; }
  .admin-nav button i[data-lucide] { width: 18px; height: 18px; }
  .admin-nav .badge { margin-left: auto; background: rgba(255,255,255,.18); border-radius: 999px; font-size: 11px; font-weight: 700; padding: 1px 8px; }
  .admin-nav button.on .badge { background: rgba(255,255,255,.25); }
  .as-foot { padding: 14px; border-top: 1px solid rgba(255,255,255,.12); display: flex; flex-direction: column; gap: 8px; }
  .as-foot a, .as-foot button { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 9px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.7); background: transparent; border: none; cursor: pointer; font-family: inherit; }
  .as-foot a:hover, .as-foot button:hover { background: rgba(255,255,255,.08); color: #fff; }
  .as-foot i[data-lucide]{ width: 16px; height: 16px; }

  .admin-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .admin-top { background: rgba(252,250,243,.86); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line-soft); padding: 0 32px; height: 70px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .admin-top h1 { font-size: 22px; }
  .admin-top .at-meta { font-size: 13px; color: var(--ink-mute); }
  .admin-view { padding: 32px; max-width: 1240px; }

  /* KMS · 동의문 보기 렌더 */
  .kms-view { padding: 4px 2px; color: var(--ink); }
  .kms-view .kms-title { font-size: 20px; font-family: var(--font-head); font-weight: 800; color: var(--main-deeper); margin: 4px 0 14px; padding-bottom: 12px; border-bottom: 2px solid var(--main-tint); }
  .kms-view .kms-sec { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; color: var(--ink); margin: 22px 0 10px; }
  .kms-view .kms-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: 7px; background: var(--main); color: #fff; font-size: 13px; font-weight: 800; display: grid; place-items: center; }
  .kms-view .kms-ul { margin: 6px 0 6px; padding-left: 6px; list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .kms-view .kms-ul li { position: relative; padding-left: 18px; font-size: 13.5px; line-height: 1.7; color: var(--ink-soft); }
  .kms-view .kms-ul li::before { content: ""; position: absolute; left: 3px; top: 9px; width: 5px; height: 5px; border-radius: 50%; background: var(--point); }
  .kms-view .kms-p { font-size: 13.5px; color: var(--ink-mute); margin: 6px 0; line-height: 1.7; }
  .kms-view .kms-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--line); vertical-align: -1px; margin-right: 3px; }

  /* 서브탭 (KMS · 동의문) */
  .subtabs { display: inline-flex; gap: 4px; background: var(--surface-2); border: 1px solid var(--line-soft); border-radius: 12px; padding: 5px; margin-bottom: 20px; }
  .subtabs button { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border: none; background: none; font: inherit; font-size: 14px; font-weight: 700; color: var(--ink-mute); cursor: pointer; border-radius: 9px; transition: all var(--dur-fast) var(--ease); }
  .subtabs button:hover { color: var(--ink); }
  .subtabs button.on { background: var(--main); color: #fff; box-shadow: var(--sh-sm); }
  .subtabs button i[data-lucide] { width: 16px; height: 16px; }

  /* 주문 처리 안내 */
  .oguide { border: 1px solid var(--line-soft); border-radius: 12px; background: var(--main-tint); margin-bottom: 16px; overflow: hidden; }
  .oguide summary { list-style: none; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 13px 18px; font-weight: 700; font-size: 14px; color: var(--main-deep); }
  .oguide summary::-webkit-details-marker { display: none; }
  .oguide summary i[data-lucide] { width: 17px; height: 17px; }
  .oguide-body { padding: 4px 20px 18px; }
  .oflow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 10px 0 14px; }
  .oguide-body ul { margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.95; color: var(--ink-soft); }
  .oguide-body b { color: var(--ink); }

  /* 주문 관리 — 상태 탭 */
  .otabs { display: flex; gap: 2px; border-bottom: 2px solid var(--line-soft); flex-wrap: wrap; margin-top: 4px; }
  .otabs button { padding: 11px 14px; border: none; background: none; font: inherit; font-size: 14px; font-weight: 600; color: var(--ink-mute); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .otabs button:hover { color: var(--ink); }
  .otabs button.on { color: var(--point); border-color: var(--point); }
  .otabs .cnt { color: var(--point); font-weight: 800; margin-left: 5px; font-size: 13px; }

  /* 주문 처리 버튼 (그룹) */
  .obar { display: flex; gap: 18px; flex-wrap: wrap; padding: 16px 0 4px; }
  .ogrp { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; padding: 9px 12px; border: 1px solid var(--line-soft); border-radius: 12px; background: var(--surface-2); }
  .ogrp-l { font-size: 11px; font-weight: 800; letter-spacing: .04em; color: var(--ink-mute); margin-right: 2px; }
  .obtn { padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid var(--line); background: var(--surface); cursor: pointer; font-family: inherit; color: var(--ink); white-space: nowrap; }
  .obtn:hover { border-color: var(--main); color: var(--main); }
  .obtn.primary { background: var(--info); color: #fff; border-color: var(--info); }
  .obtn.primary:hover { opacity: .92; color: #fff; }
  .odrop { position: relative; }
  .odrop-menu { position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--sh-md); padding: 6px; display: none; z-index: 40; min-width: 200px; }
  .odrop-menu.open { display: block; }
  .odrop-menu button { display: block; width: 100%; text-align: left; padding: 9px 12px; border: none; background: none; font: inherit; font-size: 13px; border-radius: 7px; cursor: pointer; }
  .odrop-menu button:hover { background: var(--surface-2); }
  .proc-info { border-left: 3px solid var(--info); background: var(--surface-2); padding: 10px 14px; font-size: 13.5px; border-radius: 0 8px 8px 0; margin-bottom: 14px; }

  /* 상품 이미지 미리보기 / 목록 썸네일 */
  .pthumb { width: 48px; height: 48px; border-radius: 8px; overflow: hidden; background: var(--surface-2); display: grid; place-items: center; color: var(--ink-faint); }
  .pthumb img { width: 100%; height: 100%; object-fit: cover; }
  .pthumb i[data-lucide] { width: 18px; height: 18px; }
  .pimg-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .pimg-cell { position: relative; width: 84px; height: 84px; border-radius: 10px; overflow: hidden; border: 1px solid var(--line-soft); background: var(--surface-2); }
  .pimg-cell.new { border-color: var(--main); box-shadow: 0 0 0 2px var(--main-tint); }
  .pimg-cell img { width: 100%; height: 100%; object-fit: cover; }
  .pimg-role { position: absolute; left: 4px; bottom: 4px; background: rgba(42,39,35,.66); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 99px; }
  .pimg-cell .gal-del { top: 4px; right: 4px; width: 20px; height: 20px; }

  /* 관련상품 멀티 드롭다운 */
  .ms { position: relative; max-width: 480px; }
  .ms-toggle { display: inline-flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; max-width: 320px; padding: 11px 14px; border: 1.5px solid var(--line); border-radius: var(--r-sm); background: var(--surface); font: inherit; font-size: 14px; cursor: pointer; color: var(--ink); }
  .ms-toggle:hover { border-color: var(--main); }
  .ms-toggle i[data-lucide] { width: 16px; height: 16px; color: var(--ink-mute); }
  .ms-panel { position: absolute; z-index: 30; margin-top: 6px; width: min(360px, 92vw); background: #fff; border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--sh-md); padding: 10px; }
  .ms-search { width: 100%; padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; font: inherit; font-size: 13px; margin-bottom: 8px; }
  .ms-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .ms-opt { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13.5px; }
  .ms-opt:hover { background: var(--surface-2); }
  .ms-opt input { width: 16px; height: 16px; accent-color: var(--main); }
  .ms-opt span:first-of-type { flex: 1; }
  .ms-cat { font-size: 11px; color: var(--ink-mute); background: var(--surface-2); padding: 2px 8px; border-radius: 99px; }
  .ms-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .ms-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--main-tint); color: var(--main-deep); font-size: 12.5px; font-weight: 600; padding: 5px 6px 5px 12px; border-radius: 99px; }
  .ms-chip button { border: none; background: none; cursor: pointer; color: var(--main-deep); display: grid; place-items: center; padding: 2px; border-radius: 50%; }
  .ms-chip button:hover { background: rgba(0,0,0,.08); }
  .ms-chip i[data-lucide] { width: 13px; height: 13px; }

  /* 대시보드 방문 차트 */
  .stat .ss { font-size: 12px; color: var(--ink-faint); margin-top: 3px; }
  .vchart { display: flex; align-items: flex-end; gap: 14px; height: 150px; padding: 0 6px; }
  .vc-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; height: 100%; }
  .vc-bar { width: 100%; max-width: 46px; background: linear-gradient(to top, var(--main), var(--main-deep)); border-radius: 7px 7px 3px 3px; min-height: 4px; }
  .vc-val { font-size: 12px; font-weight: 700; color: var(--main-deep); }
  .vc-day { font-size: 11px; color: var(--ink-mute); }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  @media (max-width: 900px){ .stat-grid { grid-template-columns: repeat(2,1fr); } }
  .stat { background: var(--surface); border: 1px solid var(--line-soft); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--sh-xs); }
  .stat .si { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; background: var(--main-tint); color: var(--main); margin-bottom: 14px; }
  .stat .si i[data-lucide]{ width: 21px; height: 21px; }
  .stat .sv { font-family: var(--font-head); font-weight: 800; font-size: 30px; line-height: 1; }
  .stat .sl { font-size: 13px; color: var(--ink-mute); margin-top: 6px; }

  .panel { background: var(--surface); border: 1px solid var(--line-soft); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--sh-xs); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 22px; border-bottom: 1px solid var(--line-soft); }
  .panel-head h3 { font-size: 17px; }
  .panel-head .ph-sub { font-size: 13px; color: var(--ink-mute); }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .admin-table th, .admin-table td { text-align: left; padding: 13px 16px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
  .admin-table th { background: var(--surface-2); font-size: 12px; color: var(--ink-soft); font-weight: 700; letter-spacing: .02em; }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tbody tr:hover { background: var(--surface-2); }
  .admin-table .dt { color: var(--ink-mute); font-size: 12.5px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .admin-empty { padding: 48px 24px; text-align: center; color: var(--ink-mute); }
  .admin-empty i[data-lucide]{ width: 34px; height: 34px; opacity: .4; margin-bottom: 10px; }

  .st-sel { font: inherit; font-size: 12.5px; font-weight: 600; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg); color: var(--ink); cursor: pointer; }
  .st-신규, .st-신규 { color: var(--point); }
  .icon-btn { background: transparent; border: 1px solid var(--line); border-radius: 8px; width: 32px; height: 32px; display: inline-grid; place-items: center; cursor: pointer; color: var(--ink-mute); }
  .icon-btn:hover { border-color: var(--danger); color: var(--danger); background: #fff; }
  .icon-btn i[data-lucide]{ width: 15px; height: 15px; }

  .admin-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 22px; }
  .admin-form .full { grid-column: 1 / -1; }
  .toggle { position: relative; width: 44px; height: 25px; border-radius: 999px; background: var(--line); border: none; cursor: pointer; transition: background var(--dur-fast); flex-shrink: 0; }
  .toggle.on { background: var(--main); }
  .toggle i { position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; transition: transform var(--dur-fast); box-shadow: var(--sh-xs); }
  .toggle.on i { transform: translateX(19px); }

  .card-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 22px; }
  .pcard { border: 1px solid var(--line-soft); border-radius: var(--r-md); padding: 16px; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
  .pcard .pc-logo { height: 60px; display: grid; place-items: center; background: var(--main-tint); color: var(--main-deep); border-radius: 8px; font-family: var(--font-head); font-weight: 800; overflow: hidden; }
  .pcard .pc-logo img { max-height: 56px; max-width: 90%; object-fit: contain; }
  .pcard .pc-name { font-weight: 700; font-size: 14px; }
  .pcard .pc-sub { font-size: 12px; color: var(--ink-mute); }
  .pcard .pc-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }

  /* 페이지 이미지 — 2단: 왼쪽 슬롯 목록 · 오른쪽 실제 페이지 미리보기 */
  .simg-split { display: grid; grid-template-columns: minmax(320px, 2fr) minmax(0, 3fr); gap: 20px; align-items: start; }
  .simg-preview { position: sticky; top: 86px; }
  .simg-frame-wrap { height: min(72vh, 860px); overflow: hidden; background: var(--bg); }
  .simg-frame-wrap iframe { display: block; border: 0; transform-origin: 0 0; }
  @media (max-width: 1100px){ .simg-split { grid-template-columns: 1fr; } .simg-preview { position: static; } }

  .login-gate { position: fixed; inset: 0; z-index: 2000; background: var(--main-deeper); display: grid; place-items: center; background-image: var(--pat-light); background-size: var(--pat-size); }
  .login-card { background: var(--surface); border-radius: var(--r-xl); box-shadow: var(--sh-lg); padding: 38px 36px; width: min(380px, 92vw); text-align: center; }
  .login-card img { width: 56px; height: 56px; mix-blend-mode: multiply; margin: 0 auto 14px; }
  .login-card h2 { font-size: 22px; }
  .login-card p { color: var(--ink-mute); font-size: 14px; margin: 8px 0 22px; }
  .login-card input { width: 100%; padding: 13px 15px; border: 1.5px solid var(--line); border-radius: var(--r-sm); font: inherit; font-size: 16px; text-align: center; }
  .login-card input:focus { outline: none; border-color: var(--main); box-shadow: 0 0 0 3px var(--main-tint); }
  .login-hint { font-size: 12px; color: var(--ink-faint); margin-top: 14px; }
  .login-err { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }
  @media (max-width: 760px){ .admin-side { position: fixed; left: -260px; transition: left .2s; z-index: 50; } .admin-view{ padding: 20px; } }

  /* =========================================================
     시니어 친화(50–60대) 보강 — 글씨·버튼·터치영역 확대 + 또렷한 포커스
     아래 규칙은 위 기본 스타일을 덮어쓰는 '가독성 레이어'입니다.
     ========================================================= */
  .admin-top h1 { font-size: 24px; }
  .admin-top .at-meta { font-size: 14px; }
  .admin-nav button { font-size: 16px; padding: 13px 15px; }
  .admin-nav button i[data-lucide] { width: 20px; height: 20px; }
  .admin-nav .badge { font-size: 12.5px; padding: 2px 9px; }
  .as-foot a, .as-foot button { font-size: 14.5px; padding: 11px 12px; }
  .panel-head h3 { font-size: 18px; }
  .panel-head .ph-sub { font-size: 13.5px; }
  .admin-table { font-size: 15px; }
  .admin-table th { font-size: 12.5px; }
  .admin-table th, .admin-table td { padding: 14px 16px; }
  .admin-table .dt { font-size: 13px; }
  .pcard .pc-name { font-size: 15px; }
  .pcard .pc-sub { font-size: 13px; }
  .field label, .admin-form label { font-size: 15px; font-weight: 700; }
  .field input, .field select { font-size: 16px; min-height: 48px; }
  .field textarea { font-size: 16px; }
  .otabs button { font-size: 15.5px; padding: 13px 16px; }
  .otabs .cnt { font-size: 14px; }
  .subtabs button { font-size: 15px; padding: 12px 20px; }
  .obtn { font-size: 15px; padding: 11px 16px; min-height: 44px; }
  .odrop-menu button { font-size: 14.5px; padding: 11px 13px; }
  .st-sel { font-size: 14px; padding: 8px 13px; }
  .icon-btn { width: 40px; height: 40px; }
  .icon-btn i[data-lucide] { width: 18px; height: 18px; }
  .oguide summary { font-size: 15px; }
  .oguide-body ul { font-size: 14.5px; }
  .proc-info { font-size: 14.5px; }
  /* 입력·조작 중인 위치를 분명히 — 또렷한 포커스 표시(키보드·저시력 사용자) */
  .admin-view input:focus, .admin-view select:focus, .admin-view textarea:focus { outline: 3px solid var(--main-tint); outline-offset: 1px; }
  .admin-nav button:focus-visible, .obtn:focus-visible, .otabs button:focus-visible,
  .subtabs button:focus-visible, .icon-btn:focus-visible, .st-sel:focus-visible,
  .as-foot a:focus-visible, .as-foot button:focus-visible { outline: 3px solid var(--point); outline-offset: 2px; }

  /* =========================================================
     대시보드 — 화면 전체 폭 채우기 + 유입/상태 그래프
     ========================================================= */
  .admin-view.view-full { max-width: none; }
  .dash-2col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 24px; margin-top: 24px; align-items: start; }
  @media (max-width: 1100px){ .dash-2col { grid-template-columns: 1fr; } }
  .src-list { display: flex; flex-direction: column; gap: 18px; }
  .src-row { display: flex; flex-direction: column; gap: 8px; }
  .src-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 14.5px; }
  .src-name { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; color: var(--ink); }
  .src-name i[data-lucide] { width: 18px; height: 18px; color: var(--ink-mute); }
  .src-num { font-weight: 700; color: var(--ink-soft); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .src-num em { color: var(--ink-mute); font-style: normal; font-weight: 600; margin-left: 5px; }
  .src-track { height: 13px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .src-fill { height: 100%; border-radius: 99px; min-width: 6px; transition: width .45s var(--ease); }

  /* 오늘 해야 할 일 — 실무 처리 대기 카드 */
