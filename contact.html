<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의하기 · 한국참전통발효식품협동조합</title>
<meta name="description" content="일반·교육·제품·제휴 문의를 남겨주세요.">
<link rel="stylesheet" href="assets/site.css">
</head>
<body data-page="contact">
<header id="site-nav"></header>

<section class="page-hero deep">
  <div class="wrap">
    <div class="crumb reveal"><a href="index.html">홈</a><i data-lucide="chevron-right"></i><span>문의하기</span></div>
    <span class="eyebrow reveal">Contact</span>
    <h1 class="reveal" style="margin-top:14px">무엇이든 편히 물어보세요</h1>
    <p class="lede reveal">교육·제품·제휴 등 궁금하신 점을 남겨주시면 담당자가 빠르게 답변드립니다.</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <!-- 연락처 -->
    <div class="grid g-4 reveal">
      <div class="card card-pad"><div class="icon-badge"><i data-lucide="phone"></i></div><h5 style="margin:16px 0 4px">전화</h5><p class="muted" style="margin:0">02-855-8806</p></div>
      <div class="card card-pad"><div class="icon-badge point"><i data-lucide="mail"></i></div><h5 style="margin:16px 0 4px">이메일</h5><p class="muted" style="margin:0">kach5501@hanmail.net</p></div>
      <div class="card card-pad"><div class="icon-badge oat"><i data-lucide="clock"></i></div><h5 style="margin:16px 0 4px">운영 시간</h5><p class="muted" style="margin:0">평일 09:00 – 18:00</p></div>
      <div class="card card-pad"><div class="icon-badge"><i data-lucide="map-pin"></i></div><h5 style="margin:16px 0 4px">주소</h5><p class="muted" style="margin:0;font-size:14px">서울 구로구 구로동 240,<br>세일빌딩 701호</p></div>
    </div>

    <!-- 문의 유형 -->
    <div class="section-head reveal" style="margin-top:72px"><span class="eyebrow">문의 유형</span><h2>어떤 도움이 필요하신가요?</h2><p class="lede">유형을 선택하면 문의 양식이 바로 열립니다.</p></div>
    <div class="grid g-4 reveal" style="margin-top:36px">
      <button class="card card-pad card-hover" data-modal="inquiry" data-type="일반 문의" style="text-align:left;background:var(--surface);cursor:pointer;border:1px solid var(--line-soft);font:inherit">
        <div class="icon-badge oat"><i data-lucide="message-circle"></i></div><h4 style="margin:16px 0 6px">일반 문의</h4><p class="muted" style="margin:0;font-size:14px">협동조합 전반에 대한 문의</p>
      </button>
      <button class="card card-pad card-hover" data-modal="inquiry" data-type="교육 문의" style="text-align:left;background:var(--surface);cursor:pointer;border:1px solid var(--line-soft);font:inherit">
        <div class="icon-badge"><i data-lucide="graduation-cap"></i></div><h4 style="margin:16px 0 6px">교육 문의</h4><p class="muted" style="margin:0;font-size:14px">체험지도사 과정·일정 문의</p>
      </button>
      <button class="card card-pad card-hover" data-modal="inquiry" data-type="제품 문의" style="text-align:left;background:var(--surface);cursor:pointer;border:1px solid var(--line-soft);font:inherit">
        <div class="icon-badge point"><i data-lucide="shopping-basket"></i></div><h4 style="margin:16px 0 6px">제품 문의</h4><p class="muted" style="margin:0;font-size:14px">주문·배송·씨장 분양 문의</p>
      </button>
      <button class="card card-pad card-hover" data-modal="inquiry" data-type="제휴 문의" style="text-align:left;background:var(--surface);cursor:pointer;border:1px solid var(--line-soft);font:inherit">
        <div class="icon-badge oat"><i data-lucide="handshake"></i></div><h4 style="margin:16px 0 6px">제휴 문의</h4><p class="muted" style="margin:0;font-size:14px">파트너십·납품·협력 제안</p>
      </button>
    </div>

    <div class="reveal" style="text-align:center;margin-top:48px">
      <button class="btn btn-point btn-lg" data-modal="inquiry"><i data-lucide="edit-3"></i>문의 양식 작성하기</button>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/site.js"></script>
</body>
</html>
